<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selected Works — Architecture</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <style>
        /* ==========================================
           AWWWARDS AESTHETIC: OPAL / EDITORIAL
           ========================================== */
        :root {
            --bg-color: #0f0f0f;
            --text-main: #f0f0f0;
            --text-muted: #666666;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
            /* Hide default cursor */
        }

        body {
            font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Custom Reactive Cursor */
        .cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1),
                height 0.3s cubic-bezier(0.25, 1, 0.5, 1),
                background-color 0.3s ease;
            mix-blend-mode: difference;
        }

        .cursor.active {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            mix-blend-mode: normal;
        }

        .cursor-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .cursor.active .cursor-text {
            opacity: 1;
        }

        /* Loader Overlay */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            z-index: 9000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2vw;
            font-weight: 300;
            letter-spacing: -0.02em;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 4vw;
        }

        .hero h1 {
            font-size: 12vw;
            font-weight: 500;
            letter-spacing: -0.05em;
            line-height: 0.85;
            text-transform: uppercase;
            overflow: hidden;
            /* For SplitType reveal */
        }

        .hero p {
            margin-top: 2rem;
            font-size: 1.5vw;
            color: var(--text-muted);
            max-width: 400px;
        }

        /* Editorial Project Layout */
        main {
            padding-bottom: 20vh;
        }

        .project-section {
            padding: 15vh 4vw;
            display: flex;
            flex-direction: column;
            gap: 10vh;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 2rem;
        }

        .project-title {
            font-size: 6vw;
            font-weight: 500;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .project-category {
            font-size: 1vw;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .editorial-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2vw;
            align-items: center;
        }

        /* Alternating layout classes */
        .img-large {
            grid-column: 2 / 10;
            height: 80vh;
        }

        .img-small {
            grid-column: 7 / 12;
            height: 60vh;
            margin-top: -20vh;
        }

        .img-full {
            grid-column: 1 / -1;
            height: 90vh;
        }

        .image-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .image-wrapper img {
            width: 100%;
            height: 130%;
            /* Extra height for parallax */
            object-fit: cover;
            /* Will be controlled by GSAP */
        }

        .image-caption {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            font-size: 0.9vw;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            mix-blend-mode: difference;
        }

        /* Lightbox */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 8000;
            justify-content: center;
            align-items: center;
            opacity: 0;
        }

        .modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        /* Utilities */
        .char {
            transform: translateY(110%);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
    </style>
</head>

<body>

    <div class="cursor" id="custom-cursor">
        <span class="cursor-text">View</span>
    </div>

    <div class="loader-overlay" id="loader">Loading Environment...</div>

    <section class="hero">
        <h1 id="hero-title">Selected<br>Works</h1>
        <p id="hero-sub">A curated catalogue of architectural concepts and spatial design.</p>
    </section>

    <main id="portfolio-container"></main>

    <div class="modal" id="imageModal" onclick="closeModal(event)">
        <img id="modalImage" src="" alt="Fullscreen Project View">
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Initialize Lenis (Smooth Scroll)
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Sync GSAP with Lenis
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000) });
        gsap.ticker.lagSmoothing(0, 0);

        // 2. Custom Cursor Logic
        const cursor = document.getElementById('custom-cursor');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Smooth cursor follow
        gsap.ticker.add(() => {
            cursorX += (mouseX - cursorX) * 0.15;
            cursorY += (mouseY - cursorY) * 0.15;
            gsap.set(cursor, { x: cursorX, y: cursorY });
        });

        // 3. Fetch Data & Build UI
        const container = document.getElementById('portfolio-container');

        fetch('projects.json')
            .then(res => res.json())
            .then(data => {
                data.forEach((project, index) => {
                    const section = document.createElement('div');
                    section.className = 'project-section';

                    const headerHTML = `
                        <div class="project-header">
                            <h2 class="project-title reveal-text">${project.title}</h2>
                            <span class="project-category">[ ${project.category} ]</span>
                        </div>
                        <div class="editorial-grid">
                    `;

                    let imagesHTML = '';
                    const layouts = ['img-large', 'img-small', 'img-full'];

                    project.images.forEach((image, i) => {
                        // Cycle through layout styles to make it look editorial
                        const layoutClass = layouts[i % layouts.length];

                        imagesHTML += `
                            <div class="image-wrapper ${layoutClass} hover-target" onclick="openModal('${image.src}')">
                                <img src="${image.src}" alt="${image.caption}" class="parallax-img">
                                <div class="image-caption">${image.caption}</div>
                            </div>
                        `;
                    });

                    section.innerHTML = headerHTML + imagesHTML + '</div>';
                    container.appendChild(section);
                });

                initAnimations();
            });

        // 4. GSAP Animations & Interactions
        function initAnimations() {
            // Hide Loader
            gsap.to("#loader", {
                yPercent: -100,
                duration: 1.2,
                ease: "expo.inOut",
                delay: 0.5
            });

            // Split Text for Hero
            const heroTitle = new SplitType('#hero-title', { types: 'chars' });
            gsap.to(heroTitle.chars, {
                y: 0,
                stagger: 0.05,
                duration: 1,
                ease: "expo.out",
                delay: 1.2
            });

            gsap.from("#hero-sub", {
                opacity: 0,
                y: 20,
                duration: 1,
                delay: 1.8
            });

            // Parallax Images
            const parallaxImages = document.querySelectorAll('.parallax-img');
            parallaxImages.forEach(img => {
                gsap.fromTo(img,
                    { y: "-15%" },
                    {
                        y: "15%",
                        ease: "none",
                        scrollTrigger: {
                            trigger: img.parentElement,
                            start: "top bottom",
                            end: "bottom top",
                            scrub: true
                        }
                    }
                );
            });

            // Reveal Project Titles
            const projectTitles = document.querySelectorAll('.reveal-text');
            projectTitles.forEach(title => {
                const split = new SplitType(title, { types: 'chars' });
                gsap.from(split.chars, {
                    y: 100,
                    opacity: 0,
                    stagger: 0.02,
                    duration: 1,
                    ease: "expo.out",
                    scrollTrigger: {
                        trigger: title,
                        start: "top 90%"
                    }
                });
            });

            // Cursor Hover Effects
            const hoverTargets = document.querySelectorAll('.hover-target');
            hoverTargets.forEach(target => {
                target.addEventListener('mouseenter', () => cursor.classList.add('active'));
                target.addEventListener('mouseleave', () => cursor.classList.remove('active'));
            });
        }

        // 5. Modal Logic
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');

        function openModal(src) {
            modalImg.src = src;
            modal.style.display = 'flex';
            gsap.to(modal, { opacity: 1, duration: 0.4 });
            cursor.classList.remove('active');
            lenis.stop(); // Pause scrolling
        }

        function closeModal(e) {
            if (e.target === modal) {
                gsap.to(modal, {
                    opacity: 0,
                    duration: 0.4,
                    onComplete: () => {
                        modal.style.display = 'none';
                        modalImg.src = '';
                        lenis.start(); // Resume scrolling
                    }
                });
            }
        }
    </script>
</body>

</html>
